<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/media600px.css">
    <title>WebSec-lab1</title>
</head>
<body>
    <form id="calculator">
        <div class="block">
            <input type="number" name="input_one" class="input_block block_style" placeholder="123">
            <select name="input_block" id="input_block" class="block_style">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
            <input type="number" name="input_two" class="operation_block block_style" placeholder="456">
        </div>
        <div class="block">
            <button type="submit"
                name="calculate"
                class="block_style"
                id="calculate">
                подсчитать
            </button>
        </div>
        <div class="block">
            <div class="block_style" id="result"></div>
        </div>
    </form>
    <script src="./js/index.js"></script>
</body>
</html>
